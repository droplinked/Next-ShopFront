name: Deploy ECS - main

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

# Serialize deploys per-ref. Never cancel a mid-deploy — let it finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shop_droplinked_com
  ECS_CLUSTER: droplinked-cluster
  ECS_SERVICE: shop_droplinked_com_service
  CONTAINER_NAME: shop_droplinked_com
  TASK_DEFINITION: shop_droplinked_com

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::353643723135:role/github-actions-deploy
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create env file
      id: create-env
      run: |
        # Strip any rolled/stale platform Stripe pk from the bundle and pin the valid
        # one (public Elements key). Sole source so a stale ENV_FILE can't serve
        # an invalid key again.
        echo "${{ secrets.ENV_FILE }}" | grep -vE '^NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=' > .env
        echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_live_51Odtp1JYpy7bkFtu9G6zuNFyomWtE68JSvne9IEyYI43d7REBoAX98zQdRM7s4UOhpEYb4qcFBlggo0XRB36O9im006NzLBc7e" >> .env
        # --- Sentry release tagging 2026-05-19 ---
        # Source: sentry.server.config.ts:7 + sentry.edge.config.ts:7 read
        # process.env.SENTRY_RELEASE; instrumentation-client.ts:6 reads
        # NEXT_PUBLIC_SENTRY_RELEASE. Without these, all events bucket into
        # a single fake release in Sentry UI, breaking regression detection
        # + deploy correlation.
        echo "SENTRY_RELEASE=${{ github.sha }}" >> .env
        echo "NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}" >> .env
        # --- Aggregate root catalog: PROD enablement 2026-07-11 ---
        # Serve the SSR aggregate product catalog at the platform root (/) on
        # prod. APIV3_BASE_URL is intentionally left unset so it defaults to the
        # prod API host. Revert this single line to fall back to the previous
        # behaviour (root redirects to /home).
        echo "NEXT_PUBLIC_ROOT_CATALOG_ENABLED=true" >> .env
        echo "NEXT_PUBLIC_MOR_CHECKOUT_ENABLED=true" >> .env
        # --- Unified PDP: PROD enablement 2026-07-15 ---
        # Render the interactive buy-in-place body on the SEO landing page
        # /<merchant>/product/<slug> (the GMC-registered URL) instead of the
        # static teaser that bounced to /<productId>. Verified on the dev
        # preview first. Fail-open in code (falls back to the teaser if the
        # interactive product can't be resolved), so this never regresses the
        # GMC landing-page check. Revert this single line to fall back to the
        # static teaser (reversible, no code revert).
        echo "NEXT_PUBLIC_UNIFIED_PDP_ENABLED=true" >> .env
        # --- Premium PDP: PROD enablement 2026-07-16 ---
        # Render the Bloomingdale's-grade product body (breadcrumb, rail
        # gallery, size pills, accordions, POD boilerplate stripped) on both
        # the id route and the unified slug route. Verified on the dev preview
        # first. Flag OFF -> the legacy interactive body is byte-identical, so
        # this is fully reversible by removing this single line.
        echo "NEXT_PUBLIC_PREMIUM_PDP_ENABLED=true" >> .env

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        # --- Sentry source-map upload 2026-05-19 ---
        # See dev.yml for full rationale. Operator must set
        # SENTRY_AUTH_TOKEN, SENTRY_ORG=droplinked,
        # SENTRY_PROJECT_NEXT_SHOPFRONT in org-level secrets.
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_NEXT_SHOPFRONT }}
      run: |
        docker build \
          --build-arg SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN" \
          --build-arg SENTRY_ORG="$SENTRY_ORG" \
          --build-arg SENTRY_PROJECT="$SENTRY_PROJECT" \
          --build-arg SENTRY_RELEASE="$IMAGE_TAG" \
          --build-arg NEXT_PUBLIC_SENTRY_RELEASE="$IMAGE_TAG" \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Retrieve current task definition JSON
      run: |
        aws ecs describe-task-definition --task-definition "${{ env.TASK_DEFINITION }}" --output json > task-def.json

    - name: Install jq
      run: sudo apt-get install jq

    - name: Extract task definition
      run: |
        jq '.taskDefinition' task-def.json > temp-task-def.json
        jq 'del(.enableFaultInjection)' temp-task-def.json > task-definition-fixed.json
        mv task-definition-fixed.json task-definition.json

    - name: Display task definition
      run: cat task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ env.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: false
