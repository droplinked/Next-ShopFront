name: Deploy ECS - dev

on:
  push:
    branches: [ "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

# Serialize deploys per-ref. Never cancel a mid-deploy — let it finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shopdev_droplinked_com
  ECS_CLUSTER: droplinked-cluster
  ECS_SERVICE: shopdev_droplinked_com_service
  CONTAINER_NAME: shopdev_droplinked_com
  TASK_DEFINITION: shopdev_droplinked_com

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::353643723135:role/github-actions-deploy
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create env file
      id: create-env
      run: |
        echo "${{ secrets.ENV_FILE_dev }}" > .env
        # --- Sentry release tagging 2026-05-19 ---
        # Source: sentry.server.config.ts:7 + sentry.edge.config.ts:7 read
        # process.env.SENTRY_RELEASE; instrumentation-client.ts:6 reads
        # NEXT_PUBLIC_SENTRY_RELEASE. Without these, all events bucket into
        # a single fake release in Sentry UI, breaking regression detection
        # + deploy correlation.
        echo "SENTRY_RELEASE=${{ github.sha }}" >> .env
        echo "NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}" >> .env
        # --- Aggregate root catalog: dev/shopdev preview 2026-07-11 ---
        # Enable the SSR aggregate product catalog at the platform root on the
        # dev environment only, pointed at the dev API host where the public
        # marketplace endpoint is deployed. Prod (main.yml) leaves both unset →
        # ROOT_CATALOG_ENABLED absent = OFF, so the prod root keeps redirecting
        # to /home until an explicit prod enablement.
        echo "NEXT_PUBLIC_ROOT_CATALOG_ENABLED=true" >> .env
        # --- Unified PDP + MoR checkout: dev preview 2026-07-15 ---
        # UNIFIED_PDP: render the interactive product body (slider + Buy-now +
        # description) on the SEO landing page /<merchant>/product/<slug> instead
        # of the static teaser that bounced to /<productId>. MOR_CHECKOUT: route
        # the aggregate-root Buy-now through the platform MoR Stripe session
        # (POST /mor-checkout/session) — the aggregate root has no shop-scoped
        # cart context, so the unified PDP's Buy only completes with this ON.
        # Prod (main.yml) already has MOR_CHECKOUT on; UNIFIED_PDP stays OFF on
        # prod until sign-off (this is the GMC-reinstatement landing page).
        echo "NEXT_PUBLIC_UNIFIED_PDP_ENABLED=true" >> .env
        echo "NEXT_PUBLIC_MOR_CHECKOUT_ENABLED=true" >> .env
        echo "APIV3_BASE_URL=https://apiv3dev.droplinked.com" >> .env
    
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        # --- Sentry source-map upload 2026-05-19 ---
        # When SENTRY_AUTH_TOKEN secret is set, withSentryConfig in
        # next.config.mjs uploads source maps during `yarn build` so
        # production stack traces de-minify. Build still succeeds with
        # no token (warns + skips). Operator: mint org-level
        # SENTRY_AUTH_TOKEN, SENTRY_ORG=droplinked, and per-project
        # SENTRY_PROJECT_NEXT_SHOPFRONT in GH org secrets.
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_NEXT_SHOPFRONT }}
      run: |
        docker build \
          --build-arg SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN" \
          --build-arg SENTRY_ORG="$SENTRY_ORG" \
          --build-arg SENTRY_PROJECT="$SENTRY_PROJECT" \
          --build-arg SENTRY_RELEASE="$IMAGE_TAG" \
          --build-arg NEXT_PUBLIC_SENTRY_RELEASE="$IMAGE_TAG" \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Retrieve current task definition JSON
      run: |
        aws ecs describe-task-definition --task-definition "${{ env.TASK_DEFINITION }}" --output json > task-def.json

    - name: Install jq
      run: sudo apt-get install jq

    - name: Extract task definition
      run: |
        jq '.taskDefinition' task-def.json > temp-task-def.json 
        jq 'del(.enableFaultInjection)' temp-task-def.json > task-definition-fixed.json
        mv task-definition-fixed.json task-definition.json

    - name: Display task definition
      run: cat task-definition.json
      
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ env.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: false
